<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>نظام الحسابات الشامل</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body data-theme="dark">

  <!-- ===================== شاشة تسجيل الدخول ===================== -->
  <div id="loginScreen">
    <div class="login-orb o1"></div>
    <div class="login-orb o2"></div>
    <div class="login-card">
      <div class="login-logo">💠</div>
      <h1 id="loginBrandName">نظام الحسابات</h1>
      <p>سجّل دخولك للمتابعة</p>
      <input type="text" id="loginUsername" placeholder="اليوزرنيم" autocomplete="username">
      <input type="password" id="loginPassword" placeholder="كلمة المرور" autocomplete="current-password">
      <button class="btn-primary-full" id="loginBtn" onclick="handleLogin()">دخول</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- ===================== هيكل التطبيق الرئيسي ===================== -->
  <div id="app" style="display:none;">
    <div id="sidebar">
      <div class="brand">
        <div class="brand-logo" id="sidebarLogoFallback">💠</div>
        <img id="sidebarLogo" src="" style="display:none; width:38px; height:38px; border-radius:11px; object-fit:cover;">
        <span id="sidebarBrandName">براندي</span>
      </div>
      <div class="nav-scroll" id="navList"></div>
    </div>

    <div id="main">
      <div id="header">
        <div class="header-left">
          <button class="icon-btn" onclick="toggleSidebar()">☰</button>
          <div><div id="pageTitle">الداشبورد</div><div id="pageSubtitle"></div></div>
        </div>
        <div class="header-right">
          <div class="user-chip">
            <div class="user-avatar" id="userAvatar">؟</div>
            <div><div class="uname" id="userNameChip">—</div><div class="urole" id="userRoleChip">—</div></div>
          </div>
          <button class="icon-btn" onclick="toggleTheme()" id="themeToggleBtn">🌙</button>
          <div style="position:relative;">
            <button class="icon-btn" onclick="toggleNotifications()">🔔<span class="badge" id="notifBadge" style="display:none;">0</span></button>
            <div id="notifDropdown" style="display:none;"></div>
          </div>
        </div>
      </div>
      <div id="content"><div class="empty-state"><span class="emoji">⏳</span><div class="msg">جاري التحميل...</div></div></div>
    </div>
  </div>

  <div id="modalOverlay" onclick="if(event.target===this) closeModal()"><div class="modal-box" id="modalBox"></div></div>
  <div id="toastContainer"></div>

  <script src="js/supabaseClient.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
